<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Tweetbank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/styles/styles.css"/>
</head>
<body>

<header>
  <div class="header-left">
    <span class="paw-icon">🐾</span>
    <div class="site-title" id="siteTitle">Bring Back <span>Brownie</span><br><small id="siteSubtitle" style="font-size:0.65em;font-weight:400;color:#aaa;font-family:'DM Mono',monospace;">Tweetbank</small></div>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat"><strong id="statTotal">36</strong> tweets ready</div>
  <div class="stat"><strong id="statIcon">🐕</strong> <span id="statText">#BringBackBrownie</span></div>
</div>

<div class="hero">
  <div class="hero-tag" id="heroTag">Dog Welfare Campaign</div>
  <h1 id="heroHeading">Help Us Find <em>Brownie</em></h1>
  <p id="heroDescription">Select a tweet, copy or post directly through your X account. One voice at a time — let's bring Brownie home.</p>
</div>

<div class="controls">
  <button class="filter-btn active" onclick="setFilter('all', this)" id="filterAllBtn">All</button>
  <button class="filter-btn" onclick="setFilter('hindi', this)">Hindi</button>
  <button class="filter-btn" onclick="setFilter('english', this)">English</button>
  <div class="search-wrap">
    <input type="text" placeholder="Search tweets…" oninput="onSearch(this.value)" id="searchInput">
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<div class="tweet-grid" id="tweetGrid"></div>

<div id="toast"></div>

<script src="./assets/scripts/scripts.js"></script>

</body>
</html>
